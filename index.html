<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tıklama Oyunu</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
margin:0;
padding:20px;
}

h1{
font-size:32px;
}

#puan{
font-size:42px;
margin:15px;
}

#sure{
font-size:26px;
margin:10px;
}

input{
font-size:20px;
padding:8px;
width:120px;
text-align:center;
}

button{
width:90%;
max-width:400px;
font-size:22px;
padding:18px;
margin:8px;
border:none;
border-radius:12px;
cursor:pointer;
}

#tiklaBtn{
background:#2196F3;
color:white;
font-size:30px;
padding:25px;
}

#durBtn{
background:#ff9800;
color:white;
}

#devamBtn{
background:#4caf50;
color:white;
display:none;
}

#bitirBtn{
background:#f44336;
color:white;
display:none;
}

#hata{
color:red;
font-weight:bold;
margin:10px;
}

#bitisEkrani{
display:none;
margin-top:25px;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
max-width:400px;
}

td,th{
border:1px solid black;
padding:8px;
}

</style>
</head>

<body>

<h1>Tıklama Oyunu</h1>

<div>
Oyun Süresi:
<br>
<input type="number" id="sureSec" min="5" max="120" value="60">
</div>

<div id="hata"></div>
<div id="sure">Süre: 0</div>
<div id="puan">Puan: 0</div>

<button id="tiklaBtn" onclick="tikla()">TIKLA</button>

<button id="durBtn" onclick="oyunuDurdur()">Oyunu Durdur</button>

<button id="devamBtn" onclick="oyunuDevamEt()">Devam Et</button>
<button id="bitirBtn" onclick="oyunuBitir()">Oyunu Bitir</button>

<div id="bitisEkrani">
<h2>Oyun Bitti!</h2>
<h3 id="finalSkor"></h3>
<button onclick="tekrarOyna()">Tekrar Oyna</button>
</div>

<h2>Liderlik Tablosu</h2>

<button onclick="listeyiSifirla()">Liderlik Tablosunu Sıfırla</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Skor</th>
<th>Süre</th>
</tr>
</thead>
<tbody id="skorTablo"></tbody>
</table>

<script>

let puan=0,sure=0,baslangicSure=0;
let oyunBitti=true,oyunBasladi=false,duraklatildi=false,timer;

function hataMesaji(mesaj){
document.getElementById("hata").innerText=mesaj;
}

function oyunuBaslat(){

puan=0;
oyunBasladi=true;
oyunBitti=false;
duraklatildi=false;

document.getElementById("hata").innerText="";
document.getElementById("bitisEkrani").style.display="none";
document.getElementById("devamBtn").style.display="none";
document.getElementById("bitirBtn").style.display="none";

sure=parseInt(document.getElementById("sureSec").value);
baslangicSure=sure;

if(isNaN(sure)){
hataMesaji("Süre gir.");
oyunBitti=true;
return;
}

if(sure<5||sure>120){
hataMesaji("5-120 saniye arası olmalı.");
oyunBitti=true;
return;
}

document.getElementById("puan").innerText="Puan: 0";
document.getElementById("sure").innerText="Süre: "+sure;

clearInterval(timer);

timer=setInterval(()=>{

if(!oyunBitti&&!duraklatildi){

if(sure>0){
sure--;
document.getElementById("sure").innerText="Süre: "+sure;
}
else{
oyunBitti=true;
clearInterval(timer);
skorKaydet();
oyunBittiEkrani();
}

}

},1000);

}

function tikla(){

if(!oyunBasladi) oyunuBaslat();

if(oyunBitti){
hataMesaji("Oyun bitti.");
return;
}

if(duraklatildi){
hataMesaji("Oyun duraklatıldı.");
return;
}

puan++;
document.getElementById("puan").innerText="Puan: "+puan;

}

function oyunuDurdur(){

if(!oyunBasladi||oyunBitti){
hataMesaji("Duracak oyun yok.");
return;
}

duraklatildi=true;

document.getElementById("devamBtn").style.display="block";
document.getElementById("bitirBtn").style.display="block";

}

function oyunuDevamEt(){

duraklatildi=false;

document.getElementById("devamBtn").style.display="none";
document.getElementById("bitirBtn").style.display="none";

}

function oyunuBitir(){

oyunBitti=true;

clearInterval(timer);

skorKaydet();

oyunBittiEkrani();

}

function oyunBittiEkrani(){

document.getElementById("bitisEkrani").style.display="block";

document.getElementById("finalSkor").innerText="Skorun: "+puan;

}

function tekrarOyna(){

location.reload();

}

function skorKaydet(){

let skorlar=JSON.parse(localStorage.getItem("skorlar"))||[];

skorlar.push({puan:puan,sure:baslangicSure});

skorlar.sort((a,b)=>b.puan-a.puan);

skorlar=skorlar.slice(0,10);

localStorage.setItem("skorlar",JSON.stringify(skorlar));

liderlikGoster();

}

function liderlikGoster(){

let skorlar=JSON.parse(localStorage.getItem("skorlar"))||[];

let tablo=document.getElementById("skorTablo");

tablo.innerHTML="";

skorlar.forEach((item,index)=>{

tablo.innerHTML+=`<tr><td>${index+1}</td><td>${item.puan}</td><td>${item.sure}</td></tr>`;

});

}

function listeyiSifirla(){

localStorage.removeItem("skorlar");

liderlikGoster();

}

liderlikGoster();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tıklama Oyunu</title>
<style>
body{ font-family:Arial; text-align:center; margin-top:60px; background:#f2f2f2; }
#puan{ font-size:40px; margin:20px; }
#sure{ font-size:25px; }
#tiklaBtn{ background-color:#2196F3; color:white; font-size:26px; padding:15px 40px; border:none; border-radius:10px; cursor:pointer; transition:0.2s; }
#tiklaBtn:hover{ background-color:#0b7dda; transform:scale(1.05); }
#durBtn{ background-color:#ff9800; color:white; border:none; border-radius:8px; padding:10px 20px; font-size:18px; cursor:pointer; margin-bottom:5px; }
#devamBtn{ background-color:#4caf50; color:white; border:none; border-radius:8px; padding:10px 20px; font-size:18px; cursor:pointer; display:none; margin-right:5px; }
#bitirBtn{ background-color:#f44336; color:white; border:none; border-radius:8px; padding:10px 20px; font-size:18px; cursor:pointer; display:none; }
#hata{ color:red; font-weight:bold; margin:10px; }
#bitisEkrani{ display:none; margin-top:25px; }
table{ margin:auto; border-collapse:collapse; }
td,th{ border:1px solid black; padding:8px 15px; }
</style>
</head>
<body>

<h1>Tıklama Oyunu</h1>

<div>Oyun Süresi: <input type="number" id="sureSec" min="5" max="120" value="60"></div>

<div id="hata"></div>
<div id="sure">Süre: 0</div>
<div id="puan">Puan: 0</div>

<button id="tiklaBtn" onclick="tikla()">Tıkla!</button>
<br><br>

<button id="durBtn" onclick="oyunuDurdur()">Oyunu Durdur</button>
<br>
<button id="devamBtn" onclick="oyunuDevamEt()">Devam Et</button>
<button id="bitirBtn" onclick="oyunuBitir()">Oyunu Bitir</button>

<div id="bitisEkrani">
<h2>Oyun Bitti!</h2>
<h3 id="finalSkor"></h3>
<button onclick="tekrarOyna()">Tekrar Oyna</button>
</div>

<h2>Liderlik Tablosu</h2>
<button onclick="listeyiSifirla()">Liderlik Tablosunu Sıfırla</button>

<table>
<thead>
<tr><th>#</th><th>Skor</th><th>Süre (sn)</th></tr>
</thead>
<tbody id="skorTablo"></tbody>
</table>

<script>
let puan=0, sure=0, baslangicSure=0;
let oyunBitti=true, oyunBasladi=false, duraklatildi=false, timer;

function hataMesaji(mesaj){ document.getElementById("hata").innerText = mesaj; }

function oyunuBaslat(){
puan=0; oyunBasladi=true; oyunBitti=false; duraklatildi=false;
document.getElementById("hata").innerText=""; 
document.getElementById("bitisEkrani").style.display="none";
document.getElementById("devamBtn").style.display="none";
document.getElementById("bitirBtn").style.display="none";

sure=parseInt(document.getElementById("sureSec").value); baslangicSure=sure;
if(isNaN(sure)){ hataMesaji("Lütfen bir süre gir."); oyunBitti=true; return; }
if(sure<5 || sure>120){ hataMesaji("Süre 5 ile 120 saniye arasında olmalıdır."); oyunBitti=true; return; }

document.getElementById("puan").innerText="Puan: 0"; 
document.getElementById("sure").innerText="Süre: "+sure;

clearInterval(timer);
timer=setInterval(()=>{
if(!oyunBitti && !duraklatildi){
if(sure>0){ sure--; document.getElementById("sure").innerText="Süre: "+sure; }
else{ oyunBitti=true; clearInterval(timer); skorKaydet(); oyunBittiEkrani(); }
}
},1000);
}

function tikla(){
if(!oyunBasladi) oyunuBaslat();
if(oyunBitti){ hataMesaji("Oyun bitti. Tekrar oyna."); return; }
if(duraklatildi){ hataMesaji("Oyun duraklatıldı. Devam etmek için 'Devam Et' butonuna basın."); return; }
puan++; document.getElementById("puan").innerText="Puan: "+puan;
}

function oyunuDurdur(){
if(!oyunBasladi || oyunBitti){ hataMesaji("Duracak bir oyun yok."); return; }
duraklatildi=true; 
document.getElementById("devamBtn").style.display="inline-block";
document.getElementById("bitirBtn").style.display="inline-block";
hataMesaji("Oyun durduruldu. Devam etmek için 'Devam Et', bitirmek için 'Oyunu Bitir' butonuna basın.");
}

function oyunuDevamEt(){
if(!duraklatildi){ hataMesaji("Devam edecek bir oyun yok."); return; }
duraklatildi=false; hataMesaji("");
document.getElementById("devamBtn").style.display="none";
document.getElementById("bitirBtn").style.display="none";
}

function oyunuBitir(){
if(!duraklatildi){ hataMesaji("Bitirilecek bir oyun yok."); return; }
oyunBitti=true;
clearInterval(timer);
skorKaydet();
oyunBittiEkrani();
document.getElementById("devamBtn").style.display="none";
document.getElementById("bitirBtn").style.display="none";
}

function oyunBittiEkrani(){
document.getElementById("bitisEkrani").style.display="block";
document.getElementById("finalSkor").innerText="Skorun: "+puan;
}

function tekrarOyna(){ location.reload(); }

function skorKaydet(){
let skorlar=JSON.parse(localStorage.getItem("skorlar"))||[];
skorlar.push({puan:puan,sure:baslangicSure});
skorlar.sort((a,b)=>b.puan-a.puan);
skorlar=skorlar.slice(0,10);
localStorage.setItem("skorlar",JSON.stringify(skorlar));
liderlikGoster();
}

function liderlikGoster(){
let skorlar=JSON.parse(localStorage.getItem("skorlar"))||[];
let tablo=document.getElementById("skorTablo"); tablo.innerHTML="";
skorlar.forEach((item,index)=>{ tablo.innerHTML+=`<tr><td>${index+1}</td><td>${item.puan}</td><td>${item.sure}</td></tr>`; });
}

function listeyiSifirla(){ localStorage.removeItem("skorlar"); liderlikGoster(); hataMesaji("Liderlik tablosu sıfırlandı."); }

liderlikGoster();

// Enter ile oyun başlatma
document.getElementById("sureSec").addEventListener("keyup", function(event){
if(event.key==="Enter"){ tikla(); }
});
</script>
</body>
</html>
